<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Network</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
</head>
<body>

    <h1>Social Media Network</h1>

    <div class="person-buttons">
        <button onclick="selectPerson('Daniel')">Daniel</button>
        <button onclick="selectPerson('Kelly')">Kelly</button>
        <button onclick="selectPerson('April')">April</button>
        <button onclick="selectPerson('Craig')">Craig</button>
        <button onclick="selectPerson('Viel')">Viel</button>
    </div>

    <div class="controls">
        <button onclick="findConnection()">Find Connection</button>
    </div>

    <div class="main">
        <div id="cy"></div>
        <div id="details">Select a person, then click Find Connection.</div>
    </div>

    <script src="script.js"></script>

</body>
</html>
