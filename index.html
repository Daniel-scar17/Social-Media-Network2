<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Network</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
</head>
<body>

<h1>My Social Media Network</h1>

<div class="top-controls">

    <input type="text" id="mainPerson" placeholder="Main Person">

    <input type="text" id="connectedPerson" placeholder="Connected Person">

    <button onclick="addConnectedPerson()">
        Add Connected Person
    </button>

</div>

<div class="main-layout">

    <div class="left-panel">

        <h2>Connected People</h2>

        <div id="peopleList"></div>

    </div>

    <div class="center-panel">

        <div id="cy"></div>

    </div>

    <div class="right-panel">

        <h2 id="selectedPersonTitle">
            Select a Person
        </h2>

        <input
            type="text"
            id="dataInput"
            placeholder="Enter Data / Platform"
        >

        <button onclick="addDataToSelectedPerson()">
            Add Data
        </button>

        <div id="personData"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
